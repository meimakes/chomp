<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chomp Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0f1117; --card: #1a1d27; --border: #2a2d3a;
    --text: #e4e4e7; --muted: #8b8d97; --accent: #818cf8;
    --green: #34d399; --red: #f87171; --amber: #fbbf24; --blue: #60a5fa;
    --pink: #f472b6;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; padding: 20px; max-width: 1200px; margin: 0 auto; }
  h1 { font-size: 1.8rem; font-weight: 700; margin-bottom: 4px; }
  .header { display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 12px; margin-bottom: 24px; }
  .header-left { flex: 1; }
  .subtitle { color: var(--muted); font-size: 0.9rem; }
  .controls { display: flex; gap: 8px; align-items: center; }
  .controls select { background: var(--card); color: var(--text); border: 1px solid var(--border); border-radius: 8px; padding: 6px 12px; font-size: 0.85rem; cursor: pointer; }
  .controls select:focus { outline: none; border-color: var(--accent); }
  .grid { display: grid; gap: 16px; margin-bottom: 24px; }
  .grid-4 { grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); }
  .grid-2 { grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
  .card h3 { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); margin-bottom: 8px; }
  .card .value { font-size: 1.8rem; font-weight: 700; }
  .card .detail { font-size: 0.8rem; color: var(--muted); margin-top: 4px; }
  .chart-card { padding: 16px; }
  .chart-card h2 { font-size: 1rem; font-weight: 600; margin-bottom: 12px; }
  canvas { width: 100% !important; }
  .target-bar { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; font-size: 0.85rem; }
  .target-bar .bar-bg { flex: 1; height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; }
  .target-bar .bar-fill { height: 100%; border-radius: 4px; }
  .food-list { list-style: none; }
  .food-list li { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 0.85rem; }
  .food-list li:last-child { border: none; }
  .food-list .count { color: var(--accent); font-weight: 600; }
  .hit { color: var(--green); } .miss { color: var(--red); }
  .loading { text-align: center; padding: 40px; color: var(--muted); }
  .today-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
  .today-table th { text-align: left; color: var(--muted); font-weight: 500; padding: 8px 6px; border-bottom: 1px solid var(--border); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; }
  .today-table td { padding: 8px 6px; border-bottom: 1px solid var(--border); }
  .today-table tr:last-child td { border: none; }
  .today-table .num { text-align: right; font-variant-numeric: tabular-nums; }
  .donut-container { display: flex; align-items: center; justify-content: center; }
  .donut-container canvas { max-height: 220px; }
  @media (max-width: 640px) {
    body { padding: 12px; }
    .card .value { font-size: 1.4rem; }
    .header { flex-direction: column; }
    .grid-2 { grid-template-columns: 1fr; }
    .grid-4 { grid-template-columns: repeat(2, 1fr); }
    .today-table { font-size: 0.78rem; }
  }
</style>
</head>
<body>
<div class="header">
  <div class="header-left">
    <h1>Chomp Dashboard</h1>
    <p class="subtitle" id="dateRange">Loading...</p>
  </div>
  <div class="controls">
    <select id="dayRange" title="Date range">
      <option value="7">7 days</option>
      <option value="14">14 days</option>
      <option value="30" selected>30 days</option>
      <option value="90">90 days</option>
    </select>
  </div>
</div>

<div class="grid grid-4" id="summary-cards"><div class="loading">Loading data...</div></div>

<div class="grid grid-2" id="today-section" style="display:none">
  <div class="card" id="todayCard"><h2 style="font-size:1rem;font-weight:600;margin-bottom:12px">Today's Entries</h2><table class="today-table" id="todayTable"></table></div>
  <div class="card chart-card"><h2>Macro Ratio (avg by calories)</h2><div class="donut-container"><canvas id="chartDonut"></canvas></div></div>
</div>

<div class="grid grid-2">
  <div class="card chart-card"><h2>Daily Calories & Protein</h2><canvas id="chartMain"></canvas></div>
  <div class="card chart-card"><h2>Daily Fat & Carbs</h2><canvas id="chartMacros"></canvas></div>
</div>
<div class="grid grid-2" style="margin-top:16px">
  <div class="card" id="targets"></div>
  <div class="card" id="topFoods"><h2 style="font-size:1rem;font-weight:600;margin-bottom:12px">Top Foods by Frequency</h2><ul class="food-list" id="foodList"></ul></div>
</div>
<div class="grid grid-2" style="margin-top:16px">
  <div class="card chart-card"><h2>Day-of-Week Avg Calories</h2><canvas id="chartDow"></canvas></div>
  <div class="card chart-card"><h2>Day-of-Week Avg Protein</h2><canvas id="chartDowP"></canvas></div>
</div>

<script>
// Configurable targets via URL params
const params = new URLSearchParams(window.location.search);
const TARGET_PROTEIN = +(params.get('protein') || 100);
const TARGET_CALORIES = +(params.get('calories') || 2000);
const CALORIE_MODE = params.get('calorieMode') || 'under'; // 'under' or 'over'

// Track chart instances for cleanup on reload
let chartInstances = [];
function destroyCharts() {
  chartInstances.forEach(c => c.destroy());
  chartInstances = [];
}
function createChart(ctx, config) {
  const c = new Chart(ctx, config);
  chartInstances.push(c);
  return c;
}

async function loadDashboard() {
  destroyCharts();

  const days = document.getElementById('dayRange').value;
  const resp = await fetch(`/api/export?days=${days}`);
  const csvText = await resp.text();

  const rows = csvText.trim().split('\n').slice(1).map(line => {
    const [date, food, amount, protein, fat, carbs, calories] = line.split(',');
    return { date, food: food ? food.trim().toLowerCase() : '', protein: +protein, fat: +fat, carbs: +carbs, calories: +calories };
  }).filter(r => r.date && !isNaN(r.calories));

  if (rows.length === 0) {
    document.getElementById('summary-cards').innerHTML = '<div class="card"><h3>No Data</h3><div class="value">--</div><div class="detail">Log some food first!</div></div>';
    return;
  }

  // Aggregate by day
  const daily = {};
  rows.forEach(r => {
    if (!daily[r.date]) daily[r.date] = { protein: 0, fat: 0, carbs: 0, calories: 0 };
    daily[r.date].protein += r.protein;
    daily[r.date].fat += r.fat;
    daily[r.date].carbs += r.carbs;
    daily[r.date].calories += r.calories;
  });
  const dates = Object.keys(daily).sort();
  const dayData = dates.map(d => daily[d]);
  const n = dates.length;

  document.getElementById('dateRange').textContent = `${dates[0]} \u2013 ${dates[n-1]} (${n} days)`;

  // Averages
  const avg = k => (dayData.reduce((s, d) => s + d[k], 0) / n).toFixed(0);
  const avgCal = avg('calories'), avgP = avg('protein'), avgF = avg('fat'), avgC = avg('carbs');

  // Summary cards
  const proteinHit = dayData.filter(d => d.protein >= TARGET_PROTEIN).length;
  const calHit = CALORIE_MODE === 'under'
    ? dayData.filter(d => d.calories <= TARGET_CALORIES).length
    : dayData.filter(d => d.calories >= TARGET_CALORIES).length;
  const calLabel = CALORIE_MODE === 'under' ? `\u2264 ${TARGET_CALORIES}` : `\u2265 ${TARGET_CALORIES}`;

  document.getElementById('summary-cards').innerHTML = `
    <div class="card"><h3>Avg Calories</h3><div class="value">${avgCal}</div><div class="detail">per day</div></div>
    <div class="card"><h3>Avg Protein</h3><div class="value" style="color:var(--accent)">${avgP}g</div><div class="detail">target: ${TARGET_PROTEIN}g</div></div>
    <div class="card"><h3>Protein Days Hit</h3><div class="value ${proteinHit/n>.5?'hit':'miss'}">${proteinHit}/${n}</div><div class="detail">${(proteinHit/n*100).toFixed(0)}% of days \u2265 ${TARGET_PROTEIN}g</div></div>
    <div class="card"><h3>Calorie Days Hit</h3><div class="value ${calHit/n>.5?'hit':'miss'}">${calHit}/${n}</div><div class="detail">${(calHit/n*100).toFixed(0)}% of days ${calLabel}</div></div>
  `;

  // Targets section (last 14 days or fewer)
  const targetDays = dates.slice(-14);
  const targetHTML = `<h2 style="font-size:1rem;font-weight:600;margin-bottom:16px">Target Tracking (last ${targetDays.length} days)</h2>` +
    targetDays.map(d => {
      const day = daily[d];
      const pPct = Math.min(day.protein / TARGET_PROTEIN * 100, 100);
      const pColor = day.protein >= TARGET_PROTEIN ? 'var(--green)' : 'var(--red)';
      const cPct = Math.min(day.calories / TARGET_CALORIES * 100, 100);
      const cColor = (CALORIE_MODE === 'under' ? day.calories <= TARGET_CALORIES : day.calories >= TARGET_CALORIES) ? 'var(--green)' : 'var(--red)';
      const label = d.slice(5);
      return `<div class="target-bar"><span style="width:48px">${label}</span><span style="width:50px;font-size:0.75rem;color:var(--muted)">P:${day.protein.toFixed(0)}g</span><div class="bar-bg"><div class="bar-fill" style="width:${pPct}%;background:${pColor}"></div></div><span style="width:55px;font-size:0.75rem;color:var(--muted)">C:${day.calories.toFixed(0)}</span><div class="bar-bg"><div class="bar-fill" style="width:${cPct}%;background:${cColor}"></div></div></div>`;
    }).join('');
  document.getElementById('targets').innerHTML = targetHTML;

  // Top foods
  const foodCount = {};
  rows.forEach(r => { if (r.food) foodCount[r.food] = (foodCount[r.food] || 0) + 1; });
  const topFoods = Object.entries(foodCount).sort((a,b) => b[1]-a[1]).slice(0, 12);
  document.getElementById('foodList').innerHTML = topFoods.map(([f,c]) => `<li><span>${f}</span><span class="count">${c}\u00d7</span></li>`).join('');

  // Chart defaults
  Chart.defaults.color = '#8b8d97';
  Chart.defaults.borderColor = '#2a2d3a';
  const labels = dates.map(d => d.slice(5));

  // Main chart
  createChart(document.getElementById('chartMain'), {
    type: 'line',
    data: {
      labels,
      datasets: [
        { label: 'Calories', data: dayData.map(d => d.calories), borderColor: '#fbbf24', backgroundColor: 'rgba(251,191,36,0.1)', tension: 0.3, fill: true, yAxisID: 'y' },
        { label: 'Protein (g)', data: dayData.map(d => d.protein), borderColor: '#818cf8', backgroundColor: 'rgba(129,140,248,0.1)', tension: 0.3, fill: true, yAxisID: 'y1' }
      ]
    },
    options: {
      responsive: true, interaction: { mode: 'index', intersect: false },
      plugins: { legend: { labels: { usePointStyle: true, pointStyle: 'circle' } } },
      scales: {
        y: { position: 'left', title: { display: true, text: 'Calories' }, grid: { color: 'rgba(255,255,255,0.05)' } },
        y1: { position: 'right', title: { display: true, text: 'Protein (g)' }, grid: { drawOnChartArea: false } }
      }
    }
  });

  // Macros chart
  createChart(document.getElementById('chartMacros'), {
    type: 'line',
    data: {
      labels,
      datasets: [
        { label: 'Fat (g)', data: dayData.map(d => d.fat), borderColor: '#f472b6', tension: 0.3 },
        { label: 'Carbs (g)', data: dayData.map(d => d.carbs), borderColor: '#34d399', tension: 0.3 }
      ]
    },
    options: {
      responsive: true, interaction: { mode: 'index', intersect: false },
      plugins: { legend: { labels: { usePointStyle: true, pointStyle: 'circle' } } },
      scales: { y: { grid: { color: 'rgba(255,255,255,0.05)' } } }
    }
  });

  // Macro ratio donut chart (avg calories contribution)
  const totalPCal = +avgP * 4;
  const totalFCal = +avgF * 9;
  const totalCCal = +avgC * 4;
  createChart(document.getElementById('chartDonut'), {
    type: 'doughnut',
    data: {
      labels: ['Protein', 'Fat', 'Carbs'],
      datasets: [{
        data: [totalPCal, totalFCal, totalCCal],
        backgroundColor: ['#818cf8', '#f472b6', '#34d399'],
        borderColor: '#1a1d27',
        borderWidth: 3
      }]
    },
    options: {
      responsive: true,
      cutout: '65%',
      plugins: {
        legend: { position: 'bottom', labels: { usePointStyle: true, pointStyle: 'circle', padding: 16 } },
        tooltip: {
          callbacks: {
            label: function(ctx) {
              const total = ctx.dataset.data.reduce((a,b) => a+b, 0);
              const pct = (ctx.raw / total * 100).toFixed(0);
              return `${ctx.label}: ${ctx.raw.toFixed(0)} kcal (${pct}%)`;
            }
          }
        }
      }
    }
  });

  // Day of week
  const dowNames = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const dowBuckets = Array(7).fill(null).map(() => ({ cal: [], pro: [] }));
  dates.forEach(d => {
    const dow = new Date(d + 'T12:00:00').getDay();
    dowBuckets[dow].cal.push(daily[d].calories);
    dowBuckets[dow].pro.push(daily[d].protein);
  });
  const dowAvgCal = dowBuckets.map(d => d.cal.length ? (d.cal.reduce((a,b)=>a+b,0)/d.cal.length).toFixed(0) : 0);
  const dowAvgPro = dowBuckets.map(d => d.pro.length ? (d.pro.reduce((a,b)=>a+b,0)/d.pro.length).toFixed(0) : 0);

  createChart(document.getElementById('chartDow'), {
    type: 'bar',
    data: { labels: dowNames, datasets: [{ label: 'Avg Calories', data: dowAvgCal, backgroundColor: 'rgba(251,191,36,0.6)', borderRadius: 6 }] },
    options: { responsive: true, plugins: { legend: { display: false } }, scales: { y: { grid: { color: 'rgba(255,255,255,0.05)' } } } }
  });

  createChart(document.getElementById('chartDowP'), {
    type: 'bar',
    data: { labels: dowNames, datasets: [{ label: 'Avg Protein', data: dowAvgPro, backgroundColor: 'rgba(129,140,248,0.6)', borderRadius: 6 }] },
    options: { responsive: true, plugins: { legend: { display: false } }, scales: { y: { grid: { color: 'rgba(255,255,255,0.05)' } } } }
  });

  // Load today's entries
  loadToday();
}

async function loadToday() {
  try {
    const resp = await fetch('/api/today');
    const data = await resp.json();
    const entries = data.entries || [];

    if (entries.length === 0) {
      document.getElementById('todayTable').innerHTML = '<tr><td colspan="6" style="color:var(--muted);text-align:center;padding:16px">No entries today</td></tr>';
    } else {
      let html = '<thead><tr><th>Food</th><th>Amount</th><th class="num">Protein</th><th class="num">Fat</th><th class="num">Carbs</th><th class="num">Cal</th></tr></thead><tbody>';
      for (const e of entries) {
        html += `<tr><td>${e.food_name}</td><td>${e.amount}</td><td class="num">${e.protein.toFixed(0)}g</td><td class="num">${e.fat.toFixed(0)}g</td><td class="num">${e.carbs.toFixed(0)}g</td><td class="num">${e.calories.toFixed(0)}</td></tr>`;
      }
      const totals = data.totals;
      html += `<tr style="font-weight:600;border-top:2px solid var(--border)"><td>Total</td><td></td><td class="num">${totals.protein.toFixed(0)}g</td><td class="num">${totals.fat.toFixed(0)}g</td><td class="num">${totals.carbs.toFixed(0)}g</td><td class="num">${totals.calories.toFixed(0)}</td></tr>`;
      html += '</tbody>';
      document.getElementById('todayTable').innerHTML = html;
    }
    document.getElementById('today-section').style.display = '';
  } catch (e) {
    // silently skip if today endpoint fails
  }
}

document.getElementById('dayRange').addEventListener('change', () => {
  loadDashboard().catch(err => {
    document.getElementById('summary-cards').innerHTML = `<div class="card"><h3>Error</h3><div class="value miss">Failed to load</div><div class="detail">${err.message}</div></div>`;
  });
});

loadDashboard().catch(err => {
  document.getElementById('summary-cards').innerHTML = `<div class="card"><h3>Error</h3><div class="value miss">Failed to load</div><div class="detail">${err.message}</div></div>`;
});
</script>
</body>
</html>
